# ─────────────────────────────────────────────────────────────────────────────
# CryptoPriceTracker — Automated Release Pipeline
#
# Triggers when a tag matching "v*" is pushed (e.g. v1.0.0).
# Steps:
#   1. Check out source
#   2. Set up JDK 17 (Temurin) + Gradle cache
#   3. Decode keystore from base64 secret
#   4. Build signed release APK
#   5. Collect commit messages since the last tag → release notes
#   6. Create a GitHub Release and attach the APK
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'          # Matches v1.0.0, v2.3.1, etc.

# Prevent multiple release runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    # Needed to create a GitHub Release and upload assets
    permissions:
      contents: write

    steps:
      # ── 1. Check out the full history so we can diff against the previous tag ──
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history required for git log between tags

      # ── 2. Set up JDK 17 (Eclipse Temurin) ───────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle           # Caches ~/.gradle automatically

      # ── 3. Grant execute permission to gradlew ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 4. Decode the base64-encoded keystore and write it to disk ────────────
      #    The file is written to a temp path and never printed to logs.
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      # ── 5. Build signed release APK ───────────────────────────────────────────
      #    Keystore credentials are passed as environment variables; Gradle reads
      #    them via System.getenv() — they are never written to disk or logs.
      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 6. Locate the produced APK and expose its path ───────────────────────
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      # ── 7. Generate release notes from commits since the previous tag ─────────
      - name: Generate release notes
        id: notes
        run: |
          # Find the tag just before the current one
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # First ever release — include all commits
            NOTES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          fi
          # Write multi-line output safely using the heredoc delimiter trick
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ── 8. Create the GitHub Release and attach the signed APK ───────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CryptoPriceTracker ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Provided automatically by GitHub

      # ── 9. Clean up keystore from runner disk ─────────────────────────────────
      - name: Remove keystore
        if: always()          # Run even if a previous step failed
        run: rm -f $RUNNER_TEMP/keystore.jks

